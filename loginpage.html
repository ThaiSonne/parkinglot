<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body class="login-body">
  <main class="login-layout">
    <section class="login-left-panel" aria-hidden="true"></section>


    <section class="login-right-panel">
      <div class="close-dot">✖</div>
      <h1>Welcome Back!</h1>
      <p class="subtitle">Sign in to continue</p>

      <form id="loginForm" class="auth-form" novalidate>
        <input id="username" name="username" type="email" placeholder="Email" required />
        <input id="password" name="password" type="password" placeholder="Password" required />

        <div class="form-row">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <p class="register-text">Don't have an account? <a href="#">Register</a></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
